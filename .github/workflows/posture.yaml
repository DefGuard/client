name: "Test posture checks gathering"
on:
  push:
    # tags:
    #   - v*.*.*
    branches:
      - posture-checks-ci

env:
  SQLX_OFFLINE: "1"

jobs:

  test-linux-postures-unencrypted:
    if: false
    name: Linux postures - unencrypted
    runs-on:
      - codebuild-defguard-posture-linux-runner-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y --no-install-recommends build-essential libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libssl-dev libxdo-dev unzip protobuf-compiler libprotobuf-dev rpm cryptsetup-bin util-linux

      - name: Run basic tests
        working-directory: src-tauri/
        run: |
          cargo test --locked --lib enterprise::inspector::tests::ci::linux::test_linux_os_name -- --ignored --exact
          cargo test --locked --lib enterprise::inspector::tests::ci::linux::test_linux_os_version -- --ignored --exact
          cargo test --locked --lib enterprise::inspector::tests::ci::linux::test_linux_kernel_version -- --ignored --exact
          cargo test --locked --lib enterprise::inspector::tests::ci::linux::test_disk_encryption_status_unencrypted -- --ignored --exact

  test-windows-postures-unencrypted:
    if: true
    name: Windows postures - unencrypted
    runs-on:
      # - codebuild-defguard-posture-windows-runner-${{ github.run_id }}-${{ github.run_attempt }}
      # - windows-latest
      - self-hosted
      - X64
      - Windows
    steps:
      - name: Install Git
        if: false
        shell: cmd
        run: |
          choco install git -y --no-progress
          echo C:\Program Files\Git\cmd>>%GITHUB_PATH%
          echo C:\Program Files\Git\bin>>%GITHUB_PATH%
          "C:\Program Files\Git\cmd\git.exe" --version

      - name: Enable long paths
        if: false
        shell: powershell
        run: |
          git config --system core.longpaths true
          New-ItemProperty `
            -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
            -Name "LongPathsEnabled" `
            -Value 1 `
            -PropertyType DWORD `
            -Force

      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install MSVC build tools
        if: false
        shell: powershell
        run: |
          choco install visualstudio2022buildtools `
            --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --includeRecommended --quiet --wait --norestart" `
            -y

      - name: Add Git Bash to PATH
        if: false
        shell: cmd
        run: |
          "C:\Program Files\Git\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        shell: cmd
        run: |
          choco install protoc -y
          protoc --version

      - name: Run basic tests
        working-directory: src-tauri/
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvars64.bat"
          cargo test --locked --lib enterprise::inspector::tests::ci::windows::test_anti_virus_status_off -- --ignored --exact
          cargo test --locked --lib enterprise::inspector::tests::ci::windows::test_part_of_domain -- --ignored --exact
          cargo test --locked --lib enterprise::inspector::tests::ci::windows::test_disk_encryption_status_unencrypted -- --ignored --exact
          cargo test --locked --lib enterprise::inspector::tests::ci::windows::test_os_name -- --ignored --exact
          cargo test --locked --lib enterprise::inspector::tests::ci::windows::test_os_version -- --ignored --exact

  test-windows-postures-encrypted:
    if: false
    name: Windows postures - encrypted
    runs-on:
      # - codebuild-defguard-posture-windows-runner-${{ github.run_id }}-${{ github.run_attempt }}
      - windows-latest
      # - build1-win
    steps:
      - name: Enable long paths
        shell: powershell
        run: |
          git config --system core.longpaths true
          New-ItemProperty `
            -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
            -Name "LongPathsEnabled" `
            -Value 1 `
            -PropertyType DWORD `
            -Force

      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install MSVC build tools
        shell: powershell
        run: |
          choco install visualstudio2022buildtools `
            --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --includeRecommended --quiet --wait --norestart" `
            -y

      - name: Add Git Bash to PATH
        shell: powershell
        run: |
          "C:\Program Files\Git\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        shell: powershell
        run: |
          choco install protoc -y
          protoc --version

      - name: Enable BitLocker on system drive
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          whoami
          net session
          Get-Tpm
          Get-BitLockerVolume -MountPoint "C:"
          $volume = Get-BitLockerVolume -MountPoint "C:"
          if ($volume.ProtectionStatus -ne "On") {
            Enable-BitLocker `
              -MountPoint "C:" `
              -EncryptionMethod XtsAes256 `
              -UsedSpaceOnly `
              -TpmProtector `
              -SkipHardwareTest
          }
          $deadline = (Get-Date).AddMinutes(5)
          do {
            Start-Sleep -Seconds 10
            $volume = Get-BitLockerVolume -MountPoint "C:"
            $volume | Format-List
          } while ($volume.ProtectionStatus -ne "On" -and (Get-Date) -lt $deadline)
          if ($volume.ProtectionStatus -ne "On") {
            throw "BitLocker protection did not turn on before timeout"
          }

      - name: Run basic tests
        working-directory: src-tauri/
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvars64.bat"
          cargo test --locked --lib enterprise::inspector::tests::ci::windows::test_disk_encryption_status_encrypted -- --ignored --exact

