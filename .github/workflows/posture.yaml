name: "Test posture checks gathering"
on:
  push:
    # tags:
    #   - v*.*.*
    branches:
      - posture-checks-ci

jobs:

  test-linux-kernel-posture:
    name: Kernel
    runs-on:
      - codebuild-defguard-posture-linux-runner-${{ github.run_id }}-${{ github.run_attempt }}
    env:
      SQLX_OFFLINE: 1
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y build-essential libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libssl-dev libxdo-dev unzip protobuf-compiler libprotobuf-dev rpm cryptsetup util-linux

      - name: Test kernel version and unencrypted disk
        working-directory: src-tauri/
        run: |
          cargo test --locked --lib enterprise::inspector::tests::ci::linux::test_linux_kernel_version -- --ignored --exact
          cargo test --locked --lib enterprise::inspector::tests::ci::linux::test_disk_encryption_status_unencrypted -- --ignored --exact

      - name: Debug crypto block support
        run: |
          set -euo pipefail
          uname -a
          ls -l /dev/loop* /dev/loop-control || true
          losetup -f || true
          ls -l /dev/mapper /dev/mapper/control || true
          cat /proc/devices | grep -E 'loop|device-mapper' || true
          grep -E 'loop|dm_crypt|dm_mod' /proc/modules || true
          lsblk -Jo NAME,FSTYPE,TYPE

      - name: Prepare block device support
        run: |
          set -euo pipefail
          modprobe loop || true
          modprobe dm-crypt || true
          [ -e /dev/loop-control ] || mknod /dev/loop-control c 10 237
          for i in $(seq 0 31); do
            [ -e "/dev/loop$i" ] || mknod "/dev/loop$i" b 7 "$i"
          done
          losetup -f
          test -e /dev/mapper/contro

      - name: Setup an encrypted partition
        run: |
          set -euo pipefail
          img="$(mktemp /tmp/defguard-luks.XXXXXX)"
          key="$(mktemp /tmp/defguard-luks-key.XXXXXX)"
          loopdev=""
          cleanup() {
            if [ -n "${mapper_opened:-}" ]; then cryptsetup close defguard-posture-test || true; fi
            if [ -n "$loopdev" ]; then losetup -d "$loopdev" || true; fi
            rm -f "$img" "$key"
          }
          trap cleanup EXIT
          truncate -s 64M "$img"
          printf 'defguard-ci-test-key' > "$key"
          loopdev="$(losetup --find --show "$img")"
          cryptsetup luksFormat --batch-mode --type luks2 "$loopdev" "$key"
          cryptsetup open "$loopdev" defguard-posture-test --key-file "$key"
          mapper_opened=1
          lsblk -Jo NAME,FSTYPE,TYPE

      - name: Test encrypted disk
        working-directory: src-tauri/
        run: |
          cargo test --locked --lib enterprise::inspector::tests::ci::linux::test_disk_encryption_status_encrypted -- --ignored --exact
