name: "Test posture checks gathering"
on:
  push:
    # tags:
    #   - v*.*.*
    branches:
      - posture-checks-ci

jobs:

  test-linux-kernel-posture:
    name: Kernel
    runs-on:
      - codebuild-defguard-posture-linux-runner-${{ github.run_id }}-${{ github.run_attempt }}
    env:
      SQLX_OFFLINE: 1
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y build-essential libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libssl-dev libxdo-dev unzip protobuf-compiler libprotobuf-dev rpm

      - name: Run test
        working-directory: src-tauri/
        run: |
          cargo test --locked --lib enterprise::inspector::tests::linux::test_linux_kernel_version -- --ignored --exact
