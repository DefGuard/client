name: 'lint'

on:
  push:
    branches:
      - main
      - dev
      - 'release/**'
    paths-ignore:
      - '*.md'
      - 'LICENSE'
  pull_request:
    branches:
      - main
      - dev
      - 'release/**'
    paths-ignore:
      - '*.md'
      - 'LICENSE'

jobs:
  lint-web:
    runs-on:
      - codebuild-defguard-client-runner-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-node@v6
        with:
          node-version: 26

      - uses: pnpm/action-setup@v6
        with:
          cache: true
          version: 11
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      # Change to '--frozen-lockfile' once this gets fixed:
      # https://github.com/pnpm/action-setup/issues/40
      - name: Install Node dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Node dependencies for new UI
        run: |
          cd new-ui
          pnpm install --no-frozen-lockfile

      - name: Run Biome and Prettier Lint
        run: pnpm lint

      - name: Audit
        run: pnpm audit --prod

      - name: Run Biome and Prettier Lint for new UI
        run: |
          cd new-ui
          pnpm lint

      - name: Audit new UI
        run: |
          cd new-ui
          pnpm audit --prod
